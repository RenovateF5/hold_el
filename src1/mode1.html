<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: transparent;
        }

        #ball {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle,
                rgba(16, 185, 129, 1) 0%,
                rgba(16, 185, 129, 0.8) 60%,
                rgba(16, 185, 129, 0) 100%);
            border-radius: 50%;
            position: fixed;
            animation: pulse-size 1.5s ease-in-out infinite;
        }

        @keyframes pulse-size {
            0%, 100% {
                transform: scale(0.8);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.3);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div id="ball"></div>

    <script>
        const { invoke } = window.__TAURI__.core;

        let timer = null;
        let countdown = null;

        function moveBall() {
            const ball = document.getElementById('ball');
            if (!ball) return;

            const maxX = window.innerWidth - 60;
            const maxY = window.innerHeight - 60;
            const x = Math.floor(Math.random() * maxX);
            const y = Math.floor(Math.random() * maxY);

            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
        }

        window.addEventListener('DOMContentLoaded', async () => {
            if (window.__TAURI__?.window) {
                const appWindow = window.__TAURI__.window.getCurrent?.() || window.__TAURI__.window.getCurrentWebviewWindow?.();
                if (appWindow) {
                    await appWindow.setIgnoreCursorEvents(true);
                }
            }

            moveBall();

            timer = setInterval(moveBall, 2000);

            countdown = setTimeout(() => {
                clearInterval(timer);
                timer = null;
                invoke('switch_mode', { mode: 'main' });
            }, 60000);
        });
    </script>
</body>
</html>
