<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode 2 - 远眺</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            overflow: hidden;
        }

        .container {
            width: 800px;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 2px solid rgba(16, 185, 129, 0.5);
            border-radius: 4px;
            overflow: hidden;
        }

        .diagonal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .diagonal::before,
        .diagonal::after {
            content: '';
            position: absolute;
            background: rgba(16, 185, 129, 0.5);
        }

        .diagonal::before {
            top: 50%;
            left: 50%;
            width: 920px;
            height: 1px;
            transform: translate(-50%, -50%) rotate(29.5deg);
        }

        .diagonal::after {
            top: 50%;
            left: 50%;
            width: 920px;
            height: 1px;
            transform: translate(-50%, -50%) rotate(-29.5deg);
        }

        #ball {
            width: 200px;
            height: 112.5px;
            background: rgba(16, 185, 129, 1);
            animation: shrink 12s ease-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 60px;
            font-weight: bold;
        }

        .text {
            position: absolute;
            color: rgba(16, 185, 129, 1);
            font-size: 48px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes shrink {
            0% {
                transform: scale(1);
            }
            75% {
                transform: scale(0.02);
            }
            100% {
                transform: scale(0.02);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="diagonal"></div>
        <div id="ball">看这里</div>
    </div>
</body>
</html>
