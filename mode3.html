<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode 3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            overflow: hidden;
        }

        .orbit-wrapper {
            width: 1000px;
            height: 1000px;
            transform: scaleY(0.6);
        }

        .orbit {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(16, 185, 129, 0.3);
            border-radius: 50%;
            position: relative;
        }

        .meteor-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            animation: orbit 4s linear infinite;
        }

        .meteor {
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 8px;
            background: linear-gradient(to right, rgba(16, 185, 129, 1), rgba(16, 185, 129, 0));
            border-radius: 4px;
        }

        @keyframes orbit {
            from {
                transform: rotate(360deg);
            }
            to {
                transform: rotate(0deg);
            }
        }
    </style>
</head>
<body>
    <div class="orbit-wrapper">
        <div class="orbit">
            <div class="meteor-container">
                <div class="meteor"></div>
            </div>
        </div>
    </div>
</body>
</html>
